name: Build iOS Unsigned IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    name: Build Unsigned iOS IPA
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: "stable"
          cache: true

      - name: Verify Flutter installation
        run: flutter doctor -v

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS Release (unsigned)
        run: flutter build ios --release --no-codesign

      - name: Create unsigned IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r -9 splitsight_unsigned.ipa Payload
          mv splitsight_unsigned.ipa ../../../

      - name: Verify IPA was created
        run: |
          ls -lh splitsight_unsigned.ipa
          unzip -l splitsight_unsigned.ipa | head -20

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: splitsight-unsigned-ipa
          path: mobile-app/splitsight_unsigned.ipa
          retention-days: 30
